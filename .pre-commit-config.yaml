repos:
  - repo: local
    hooks:
      - id: biome-check
        name: biome check
        entry: npx biome check
        language: system
        files: "\\.(ts|tsx|js|mjs|cjs|json)$"
        exclude: "(^node_modules/|^out/|^\\.vscode/|^dist/)"
        pass_filenames: true
        stages: [pre-commit, manual, pre-push]
      # no --unsafe: semantic auto-fixes must not land unreviewed at commit time
      # (the manual `npm run lint:fix` keeps --unsafe for interactive use)
      - id: biome-fix
        name: biome fix (commit stage)
        entry: npx biome check --write
        language: system
        files: "\\.(ts|tsx|js|mjs|cjs|json)$"
        exclude: "(^node_modules/|^out/|^\\.vscode/|^dist/)"
        pass_filenames: true
        stages: [pre-commit, manual]
      - id: npm-audit
        name: npm audit (prod deps)
        entry: npm audit --omit=dev
        language: system
        pass_filenames: false
        stages: [pre-commit, pre-push, manual]
